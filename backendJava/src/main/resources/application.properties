server.port=8080
spring.application.name=dn-store-backend
logging.level.com.dnstore.backend=DEBUG
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Database Configuration (Environment Variables)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/dn_store?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
